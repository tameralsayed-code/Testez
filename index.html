<!DOCTYPE html>
<html lang="ar" dir="rtl" class="transition-colors duration-300">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#3B82F6" id="theme-color-meta">
    <title>قسم الإنتاج | Ezz Steel Sadat</title>
    
    <style>
        [v-cloak] { display: none !important; }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&display=swap" rel="stylesheet">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config={darkMode:'class',theme:{extend:{fontFamily:{sans:['Tajawal','sans-serif']}}}}</script>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://unpkg.com/lucide@latest" defer></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.prod.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js" defer></script>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js" defer></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js" defer></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>

</head>
<body class="pb-safe pt-safe">

    <div id="app" v-cloak class="h-[100dvh] w-full flex flex-col relative overflow-hidden">
        
        <div v-if="!isAuthenticated" class="fixed inset-0 z-[100] flex items-center justify-center p-5 bg-slate-900">
            <div class="bg-white dark:bg-slate-800 w-full max-w-sm rounded-[32px] shadow-2xl p-7 relative z-10" style="animation: slideDown 0.4s ease-out;">
                
                <div class="w-16 h-16 bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-[22px] flex items-center justify-center mx-auto mb-4 border border-blue-100 dark:border-blue-800/50 shadow-inner">
                    <i data-lucide="shield-lock" class="w-8 h-8"></i>
                </div>
                <h3 class="text-center text-xl font-black text-gray-900 dark:text-white mb-1">Ezz Steel Sadat</h3>
                <p class="text-center text-[10px] text-gray-400 mb-6 uppercase tracking-widest font-bold">بوابة إدارة الإنتاج الآمنة</p>
                
                <div class="flex p-1 bg-gray-100 dark:bg-slate-900 rounded-2xl mb-6">
                    <button @click="loginData.role = 'user'" :class="loginData.role === 'user' ? 'bg-white dark:bg-slate-800 shadow-sm text-blue-600 font-bold' : 'text-gray-500'" class="flex-1 py-2.5 rounded-xl text-sm transition-all">موظف</button>
                    <button @click="loginData.role = 'admin'" :class="loginData.role === 'admin' ? 'bg-white dark:bg-slate-800 shadow-sm text-indigo-600 font-bold' : 'text-gray-500'" class="flex-1 py-2.5 rounded-xl text-sm transition-all">إدارة</button>
                </div>

                <form @submit.prevent="handleLogin" class="space-y-4">
                    <div>
                        <label class="form-label mb-2">اسم المستخدم</label>
                        <input v-model="loginData.username" type="text" class="form-input text-center text-lg font-bold py-3" dir="ltr" required placeholder="---" :disabled="isCheckingLogin">
                    </div>
                    <div>
                        <label class="form-label mb-2">الرقم السري</label>
                        <input v-model="loginData.password" type="password" class="form-input text-center text-xl tracking-widest py-3" dir="ltr" required placeholder="••••" :disabled="isCheckingLogin">
                    </div>
                    <button type="submit" :disabled="isCheckingLogin" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-blue-500/30 active:scale-[0.98] transition-all mt-2 flex items-center justify-center gap-2">
                        <i v-if="isCheckingLogin" data-lucide="loader" class="w-5 h-5 animate-spin"></i>
                        <i v-else data-lucide="unlock" class="w-5 h-5"></i>
                        {{ isCheckingLogin ? 'جاري التحقق...' : 'دخول آمن' }}
                    </button>
                </form>
            </div>
        </div>

        <template v-else>
            
            <div class="toast-container">
                <transition-group name="toast-list">
                    <div v-for="toast in toasts" :key="toast.id" :class="['toast', toast.type]">
                        <span>{{ toast.text }}</span>
                    </div>
                </transition-group>
            </div>

            <div v-if="latestAnnouncement" class="shrink-0 bg-gray-900 dark:bg-black text-white text-xs font-bold py-2 overflow-hidden flex items-center relative z-40 shadow-md">
                <span class="bg-rose-600 px-3 py-2 absolute right-0 z-10 h-full flex items-center shadow-[10px_0_15px_rgba(0,0,0,0.5)]">عاجل 📢</span>
                <div class="marquee-content pr-20 text-yellow-300">{{ latestAnnouncement.text }} <span class="text-gray-400 font-normal mr-2">({{ latestAnnouncement.date }})</span></div>
            </div>

            <header class="shrink-0 z-30 bg-slate-200/90 dark:bg-slate-900/95 backdrop-blur-xl border-b border-slate-300 dark:border-slate-800 shadow-md transition-colors">
                <div class="pt-8 pb-4 px-5 flex items-center justify-between">
                    <h1 class="text-xl font-bold text-gray-900 dark:text-white tracking-tight select-none">{{ headerTitle }}</h1>
                    
                    <div class="flex items-center gap-2.5">
                        <button @click="logout" class="w-11 h-11 rounded-xl bg-rose-50 dark:bg-rose-900/30 text-rose-600 dark:text-rose-400 flex items-center justify-center border border-rose-200 dark:border-rose-800 shadow-sm active:scale-95 transition-all">
                            <i data-lucide="log-out" class="w-5 h-5"></i>
                        </button>
                        
                        <button v-if="view === 'home'" @click="toggleDarkMode" class="w-11 h-11 rounded-xl bg-white dark:bg-slate-800 flex items-center justify-center border border-slate-300 dark:border-slate-700 shadow-sm active:scale-95 transition-all">
                            <span v-html="isDarkMode ? sunIcon : moonIcon"></span>
                        </button>
                        
                        <button v-if="view === 'home'" @click="navigate('dashboard')" class="w-11 h-11 rounded-xl bg-blue-50 dark:bg-blue-900/50 text-blue-600 dark:text-blue-400 flex items-center justify-center border border-blue-200 dark:border-blue-800 shadow-sm active:scale-95 transition-all">
                            <i data-lucide="bar-chart-2" class="w-5 h-5"></i>
                        </button>
                    </div>
                </div>
                
                <div v-if="view !== 'announcements' && view !== 'dashboard'" class="px-5 pb-3.5">
                    <div class="relative bg-white dark:bg-slate-800 rounded-2xl transition-colors border border-slate-300 dark:border-slate-700 shadow-sm">
                        <i data-lucide="search" class="absolute right-4 top-1/2 -translate-y-1/2 w-[18px] h-[18px] text-gray-400 dark:text-gray-500"></i>
                        <input v-model="query" type="text" placeholder="بحث بالاسم أو الكود..." class="w-full bg-transparent border-none pr-11 pl-11 py-3 rounded-2xl text-sm outline-none text-gray-900 dark:text-white placeholder-gray-400 dark:placeholder-gray-500">
                        <button v-if="query" @click="query = ''" class="absolute left-3 top-1/2 -translate-y-1/2 w-6 h-6 bg-gray-200 dark:bg-slate-700 rounded-full flex items-center justify-center hover:bg-gray-300 dark:hover:bg-slate-600 transition-colors"><i data-lucide="x" class="w-3.5 h-3.5 text-gray-600 dark:text-gray-300"></i></button>
                    </div>
                </div>
            </header>

            <main class="flex-1 overflow-y-auto px-5 pt-5 pb-32 no-scrollbar relative">
                
                <div v-if="query" class="space-y-3">
                    <div v-for="e in searchResults" :key="e.uid" @click="openDetails(e.uid)" class="bg-white dark:bg-slate-800 p-4 rounded-2xl border border-gray-100 dark:border-slate-700 flex items-center gap-4 shadow-sm cursor-pointer active:scale-95 transition-transform">
                        <div class="w-10 h-10 bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 rounded-xl flex items-center justify-center font-normal">{{ e.department === 'management' ? '💼' : e.shift }}</div>
                        <div class="text-right flex-1"><h3 class="text-sm text-gray-900 dark:text-white font-normal">{{ e.name }}</h3><p class="text-[10px] text-gray-400">{{ e.jobTitle }}</p></div>
                    </div>
                    <div v-if="!isLoading && searchResults.length === 0" class="text-center py-10 text-gray-400 text-sm">لا توجد نتائج لـ "{{ query }}"</div>
                </div>

                <div v-else-if="view === 'dashboard'" class="space-y-6" style="animation: slideDown 0.4s ease-out;">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-gradient-to-br from-blue-500 to-indigo-600 p-5 rounded-[24px] shadow-lg flex flex-col relative overflow-hidden"><i data-lucide="users" class="w-16 h-16 text-white/10 absolute -bottom-2 -left-2"></i><span class="text-3xl font-black text-white relative z-10">{{ employees.length }}</span><span class="text-[11px] text-blue-100 font-bold mt-1 relative z-10">إجمالي القوة (المسجلة)</span></div>
                        <div class="bg-white dark:bg-slate-800 p-5 rounded-[24px] shadow-sm border border-gray-100 dark:border-slate-700 flex flex-col relative overflow-hidden"><i data-lucide="activity" class="w-12 h-12 text-rose-50 dark:text-rose-900/20 absolute -bottom-2 -left-2"></i><span class="text-3xl font-black text-rose-500 relative z-10">{{ sickEmployeesCount }}</span><span class="text-[11px] text-gray-500 dark:text-gray-400 font-bold mt-1 relative z-10">إجازات مرضية</span></div>
                    </div>
                    
                    <div class="bg-white dark:bg-slate-800 p-5 rounded-[24px] shadow-sm border border-gray-100 dark:border-slate-700">
                        <div class="flex items-center gap-2 mb-4 justify-center"><i data-lucide="pie-chart" class="w-4 h-4 text-gray-400"></i><h3 class="text-[11px] font-black text-gray-500 uppercase tracking-widest">حالة التواجد الكلية</h3></div>
                        <div class="relative h-48 w-full"><canvas id="statusChart"></canvas></div>
                    </div>
                    
                    <div class="bg-white dark:bg-slate-800 p-5 rounded-[24px] shadow-sm border border-gray-100 dark:border-slate-700">
                        <div class="flex items-center gap-2 mb-4 justify-center"><i data-lucide="briefcase" class="w-4 h-4 text-gray-400"></i><h3 class="text-[11px] font-black text-gray-500 uppercase tracking-widest">توزيع المهام الوظيفية الكلية</h3></div>
                        <div class="relative h-96 w-full"><canvas id="rolesChart"></canvas></div>
                    </div>
                    
                    <div class="bg-white dark:bg-slate-800 p-5 rounded-[24px] shadow-sm border border-gray-100 dark:border-slate-700 mb-10">
                        <div class="flex items-center gap-2 mb-4 justify-center"><i data-lucide="clock" class="w-4 h-4 text-gray-400"></i><h3 class="text-[11px] font-black text-gray-500 uppercase tracking-widest">توزيع الورديات (تفصيلي)</h3></div>
                        <div class="relative h-80 w-full"><canvas id="shiftDistChart"></canvas></div>
                    </div>
                </div>

                <div v-else-if="view === 'announcements'" class="space-y-6">
                    
                    <div v-if="isAdmin" class="bg-white dark:bg-slate-800 p-5 rounded-[24px] shadow-sm border border-gray-100 dark:border-slate-700 transition-all duration-300">
                        <h3 class="text-xs font-bold text-blue-600 dark:text-blue-400 mb-4 flex items-center gap-1.5"><i data-lucide="edit" class="w-4 h-4"></i> صياغة تنبيه/إعلان جديد</h3>
                        
                        <div class="mb-4">
                            <label class="form-label mb-2">نوع الإعلان</label>
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-2">
                                <label v-for="type in [{id:'alert', name:'تنبيه 📢'}, {id:'sick', name:'مرضي 💊'}, {id:'summer', name:'مصيف 🏖️'}, {id:'umrah', name:'عمرة 🕋'}]" :key="type.id" class="relative cursor-pointer">
                                    <input type="radio" v-model="annForm.type" :value="type.id" class="peer sr-only" @change="resetAnnFormSteps(1)">
                                    <div class="text-center py-2 px-1 rounded-xl text-[11px] font-bold border border-gray-200 dark:border-slate-600 text-gray-500 dark:text-gray-400 peer-checked:bg-blue-50 peer-checked:dark:bg-blue-900/30 peer-checked:border-blue-500 peer-checked:text-blue-600 dark:peer-checked:text-blue-400 transition-all">
                                        {{ type.name }}
                                    </div>
                                </label>
                            </div>
                        </div>

                        <div v-if="annForm.type !== 'alert'" class="space-y-4 mb-4 border-t border-gray-100 dark:border-slate-700 pt-4" style="animation: slideDown 0.3s ease-out;">
                            <div class="grid grid-cols-2 gap-3">
                                <div class="form-group mb-0">
                                    <label class="form-label">من تاريخ</label>
                                    <input type="date" v-model="annForm.fromDate" class="form-input text-xs py-2" @change="resetAnnFormSteps(2)">
                                </div>
                                <div class="form-group mb-0">
                                    <label class="form-label">إلى تاريخ</label>
                                    <input type="date" v-model="annForm.toDate" class="form-input text-xs py-2" @change="resetAnnFormSteps(2)">
                                </div>
                            </div>

                            <div v-if="annForm.fromDate && annForm.toDate" class="form-group mb-0" style="animation: slideDown 0.3s ease-out;">
                                <label class="form-label">الوظيفة المستهدفة</label>
                                <select v-model="annForm.jobTitle" class="form-input py-2" @change="resetAnnFormSteps(3)">
                                    <option value="">اختر الوظيفة...</option>
                                    <option v-for="job in annAvailableJobs" :key="job" :value="job">{{ job }}</option>
                                </select>
                            </div>

                            <div v-if="annForm.jobTitle" class="form-group mb-0" style="animation: slideDown 0.3s ease-out;">
                                <label class="form-label">الموظف (طالب الإجازة)</label>
                                <select v-model="annForm.employeeUid" class="form-input py-2" @change="resetAnnFormSteps(4)">
                                    <option value="">اختر الموظف...</option>
                                    <option v-for="emp in annAvailableEmployees" :key="emp.uid" :value="emp.uid">{{ emp.name }} ({{ getDeptName(emp) }})</option>
                                </select>
                            </div>

                            <div v-if="annForm.employeeUid" class="bg-slate-50 dark:bg-slate-900/50 p-3 rounded-xl border border-slate-100 dark:border-slate-700" style="animation: slideDown 0.3s ease-out;">
                                <label class="form-label mb-2">آلية تغطية العمل</label>
                                <div class="grid grid-cols-2 gap-2 mb-3">
                                    <label class="relative cursor-pointer">
                                        <input type="radio" v-model="annForm.coverType" value="single" class="peer sr-only" @change="generateSingleCoverText">
                                        <div class="text-center py-2 rounded-xl text-xs font-bold border border-gray-200 dark:border-slate-600 text-gray-500 peer-checked:bg-indigo-50 peer-checked:dark:bg-indigo-900/30 peer-checked:border-indigo-500 peer-checked:text-indigo-600 transition-all">موظف محدد</div>
                                    </label>
                                    <label class="relative cursor-pointer">
                                        <input type="radio" v-model="annForm.coverType" value="schedule" class="peer sr-only" @change="generateAutoSchedule">
                                        <div class="text-center py-2 rounded-xl text-xs font-bold border border-gray-200 dark:border-slate-600 text-gray-500 peer-checked:bg-teal-50 peer-checked:dark:bg-teal-900/30 peer-checked:border-teal-500 peer-checked:text-teal-600 transition-all">توليد جدول ذكي</div>
                                    </label>
                                    
                                    <div v-if="annForm.coverType === 'schedule'" class="col-span-2 mt-1" style="animation: slideDown 0.3s ease-out;">
                                        <button @click="generateAutoSchedule" type="button" class="w-full bg-teal-100/50 dark:bg-teal-900/30 text-teal-700 dark:text-teal-400 border border-teal-200 dark:border-teal-800 py-2 rounded-xl text-xs font-bold active:scale-95 transition-all flex items-center justify-center gap-1.5">
                                            <i data-lucide="refresh-cw" class="w-3.5 h-3.5"></i> إعادة توليد/تحديث الجدول
                                        </button>
                                    </div>
                                </div>

                                <div v-if="annForm.coverType === 'single'" class="form-group mb-0">
                                    <select v-model="annForm.substituteUid" class="form-input py-2 mb-2" @change="generateSingleCoverText">
                                        <option value="">اختر الموظف البديل...</option>
                                        <option v-for="sub in annAvailableSubstitutes" :key="sub.uid" :value="sub.uid">{{ sub.name }} ({{ getDeptName(sub) }} - وردية {{ sub.shift }})</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="relative">
                            <textarea v-model="annForm.text" rows="3" placeholder="اكتب نص الإعلان هنا، أو التمهيد الخاص بالجدول..." class="w-full bg-gray-50 dark:bg-slate-900 border border-gray-200 dark:border-slate-700 p-3 rounded-xl text-sm outline-none focus:border-blue-500 mb-3 dark:text-white resize-none shadow-inner leading-relaxed"></textarea>
                        </div>

                        <div v-if="annForm.scheduleData.length > 0" class="mb-4 overflow-hidden rounded-xl border border-gray-200 dark:border-slate-700" style="animation: slideDown 0.3s ease-out;">
                            <div class="overflow-x-auto no-scrollbar">
                                <table class="w-full text-center text-xs min-w-[500px]">
                                    <thead class="bg-gray-100 dark:bg-slate-900/80 text-gray-600 dark:text-gray-300">
                                        <tr>
                                            <th class="p-2.5 font-bold border-b dark:border-slate-700 border-l dark:border-slate-700 bg-gray-200/50 dark:bg-slate-800/50 w-28">اليوم / التاريخ</th>
                                            <th class="p-2.5 font-bold border-b dark:border-slate-700 border-l dark:border-slate-700">الوردية الأولى</th>
                                            <th class="p-2.5 font-bold border-b dark:border-slate-700 border-l dark:border-slate-700">الوردية الثانية</th>
                                            <th class="p-2.5 font-bold border-b dark:border-slate-700">الوردية الثالثة</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr v-for="row in annForm.scheduleData" :key="row.date" class="border-b dark:border-slate-700 last:border-0 bg-white dark:bg-slate-800">
                                            <td class="p-2 border-l dark:border-slate-700 font-bold bg-gray-50 dark:bg-slate-900/30 text-gray-700 dark:text-gray-300">{{ row.date }}</td>
                                            <td class="p-2 border-l dark:border-slate-700 transition-colors" :class="{'text-indigo-600 font-black dark:text-indigo-400 bg-indigo-50/50 dark:bg-indigo-900/20': row.morning === row.subName, 'text-gray-600 dark:text-gray-400': row.morning !== row.subName}">{{ row.morning }}</td>
                                            <td class="p-2 border-l dark:border-slate-700 transition-colors" :class="{'text-indigo-600 font-black dark:text-indigo-400 bg-indigo-50/50 dark:bg-indigo-900/20': row.noon === row.subName, 'text-gray-600 dark:text-gray-400': row.noon !== row.subName}">{{ row.noon }}</td>
                                            <td class="p-2 transition-colors" :class="{'text-indigo-600 font-black dark:text-indigo-400 bg-indigo-50/50 dark:bg-indigo-900/20': row.evening === row.subName, 'text-gray-600 dark:text-gray-400': row.evening !== row.subName}">{{ row.evening }}</td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>

                        <button @click="publishAnnouncement" :disabled="!annForm.text.trim()" :class="annForm.text.trim() ? 'bg-blue-600 hover:bg-blue-700 shadow-md active:scale-95' : 'bg-gray-300 dark:bg-slate-700 cursor-not-allowed'" class="w-full text-white py-2.5 rounded-xl text-xs font-bold transition-all flex justify-center items-center gap-2">
                            <i data-lucide="send" class="w-4 h-4"></i> نشر الآن
                        </button>
                    </div>

                    <div class="space-y-4">
                        <div v-for="ann in announcementsList" :key="ann.id" class="bg-white dark:bg-slate-800 p-4 rounded-2xl border border-gray-100 dark:border-slate-700 shadow-sm relative overflow-hidden">
                            <div class="absolute right-0 top-0 bottom-0 w-1 bg-amber-400"></div>
                            <div class="flex justify-between items-start mb-3">
                                <span class="text-[10px] font-bold text-gray-400 bg-gray-50 dark:bg-slate-900 px-2 py-1 rounded-lg"><i data-lucide="clock" class="w-3 h-3 inline"></i> {{ ann.date }}</span>
                                <button v-if="isAdmin" @click="deleteAnnouncement(ann.id)" class="text-rose-500 hover:bg-rose-50 dark:hover:bg-rose-900/30 p-1.5 rounded-md transition-colors"><i data-lucide="trash" class="w-3.5 h-3.5"></i></button>
                            </div>
                            
                            <p class="text-sm font-bold text-gray-800 dark:text-gray-200 leading-relaxed whitespace-pre-wrap mb-2">{{ ann.text }}</p>
                            
                            <div v-if="ann.schedule && ann.schedule.length > 0" class="mt-4 overflow-hidden rounded-xl border border-gray-200 dark:border-slate-600 shadow-sm">
                                <div class="overflow-x-auto no-scrollbar">
                                    <table class="w-full text-center text-xs min-w-[450px]">
                                        <thead class="bg-gray-100 dark:bg-slate-900/80 text-gray-600 dark:text-gray-300">
                                            <tr>
                                                <th class="p-2 border-b dark:border-slate-600 border-l dark:border-slate-600 bg-gray-200/30 dark:bg-slate-800/50 w-24">اليوم</th>
                                                <th class="p-2 border-b dark:border-slate-600 border-l dark:border-slate-600">الوردية الأولى</th>
                                                <th class="p-2 border-b dark:border-slate-600 border-l dark:border-slate-600">الوردية الثانية</th>
                                                <th class="p-2 border-b dark:border-slate-600">الوردية الثالثة</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr v-for="row in ann.schedule" :key="row.date" class="border-b dark:border-slate-600 last:border-0 bg-white dark:bg-slate-800">
                                                <td class="p-2 border-l dark:border-slate-600 font-bold bg-gray-50 dark:bg-slate-900/30 text-gray-700 dark:text-gray-300 whitespace-pre-line leading-tight text-[10px]">{{ row.date.replace(' ', '\n') }}</td>
                                                <td class="p-2 border-l dark:border-slate-600" :class="{'text-indigo-600 font-black dark:text-indigo-400 bg-indigo-50/30 dark:bg-indigo-900/10': row.morning === row.subName, 'text-gray-600 dark:text-gray-400': row.morning !== row.subName}">{{ row.morning }}</td>
                                                <td class="p-2 border-l dark:border-slate-600" :class="{'text-indigo-600 font-black dark:text-indigo-400 bg-indigo-50/30 dark:bg-indigo-900/10': row.noon === row.subName, 'text-gray-600 dark:text-gray-400': row.noon !== row.subName}">{{ row.noon }}</td>

                                <div class="w-20 h-20 bg-white dark:bg-slate-800 rounded-[22px] flex items-center justify-center text-3xl font-black shadow-2xl border-4 border-white/20 dark:border-white/10 relative z-10" 
                                     :class="{'text-rose-600 dark:text-rose-400': selectedEmployee.status === 'sick', 'text-amber-500 dark:text-amber-400': selectedEmployee.status === 'training', 'text-blue-600 dark:text-blue-400': selectedEmployee.status === 'active' || !selectedEmployee.status}">
                                    {{ selectedEmployee.department === 'management' ? '💼' : selectedEmployee.shift }}
                                </div>
                                <div v-if="selectedEmployee.status === 'sick'" class="absolute -bottom-2 -right-2 bg-rose-500 text-white text-[10px] px-2.5 py-0.5 rounded-full font-bold shadow-md border-2 border-white z-20">مرضي</div>
                                <div v-if="selectedEmployee.status === 'training'" class="absolute -bottom-2 -right-2 bg-amber-500 text-white text-[10px] px-2.5 py-0.5 rounded-full font-bold shadow-md border-2 border-white z-20">متدرب</div>
                            </div>
                            <h2 class="text-[20px] font-black text-white leading-tight mb-1">{{ selectedEmployee.name }}</h2>
                            <div class="inline-flex items-center gap-1.5 bg-white/15 backdrop-blur-sm px-3 py-1 text-white text-[11px] font-bold rounded-xl border border-white/20"><i data-lucide="briefcase" class="w-3.5 h-3.5"></i><span class="truncate max-w-[200px]">{{ selectedEmployee.jobTitle }}</span></div>
                        </div>
                        <div v-if="selectedEmployee && (selectedEmployee.phone || isAdmin)" class="flex gap-3 px-6 -mt-6 relative z-20 mb-6"><a v-if="selectedEmployee.phone" :href="'tel:' + selectedEmployee.phone" class="flex-1 bg-white dark:bg-slate-800 rounded-2xl shadow-lg border border-gray-100 dark:border-slate-700 p-3.5 flex items-center justify-center gap-2 hover:bg-gray-50 transition-colors active:scale-95"><div class="w-8 h-8 rounded-full bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 flex items-center justify-center"><i data-lucide="phone" class="w-4 h-4"></i></div><span class="text-xs font-bold text-gray-800 dark:text-gray-200">اتصال هاتف</span></a><a v-if="selectedEmployee.phone" :href="'https://wa.me/' + cleanPhone(selectedEmployee.phone)" target="_blank" class="flex-1 bg-white dark:bg-slate-800 rounded-2xl shadow-lg border border-gray-100 dark:border-slate-700 p-3.5 flex items-center justify-center gap-2 hover:bg-gray-50 transition-colors active:scale-95"><div class="w-8 h-8 rounded-full bg-emerald-50 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 flex items-center justify-center"><i data-lucide="message-circle" class="w-4 h-4"></i></div><span class="text-xs font-bold text-gray-800 dark:text-gray-200">واتساب</span></a></div>
                        <div class="px-5 mb-6" v-if="selectedEmployee"><div class="grid grid-cols-2 gap-3">
                            
                            <div v-if="selectedEmployee.status === 'sick'" class="col-span-2 bg-rose-50 dark:bg-rose-900/10 border border-rose-100 dark:border-rose-800 rounded-2xl p-4 flex items-center justify-between shadow-sm"><div class="flex items-center gap-2"><div class="w-8 h-8 rounded-full bg-white dark:bg-rose-900 text-rose-500 dark:text-rose-300 flex items-center justify-center"><i data-lucide="activity" class="w-4 h-4"></i></div><span class="text-xs font-bold text-rose-800 dark:text-rose-300">حالة التواجد</span></div><span class="text-xs font-black text-rose-600 dark:text-rose-400 bg-white dark:bg-rose-900/50 px-2 py-1 rounded-md">إجازة مرضية</span></div>
                            <div v-if="selectedEmployee.status === 'training'" class="col-span-2 bg-amber-50 dark:bg-amber-900/10 border border-amber-100 dark:border-amber-800 rounded-2xl p-4 flex items-center justify-between shadow-sm"><div class="flex items-center gap-2"><div class="w-8 h-8 rounded-full bg-white dark:bg-amber-900 text-amber-500 dark:text-amber-300 flex items-center justify-center"><i data-lucide="award" class="w-4 h-4"></i></div><span class="text-xs font-bold text-amber-800 dark:text-amber-300">حالة التواجد</span></div><span class="text-xs font-black text-amber-600 dark:text-amber-400 bg-white dark:bg-amber-900/50 px-2 py-1 rounded-md">تحت التدريب</span></div>
                            
                            <div v-if="selectedEmployee.code" class="bg-white dark:bg-slate-800 border border-gray-100 dark:border-slate-700 rounded-2xl p-4 shadow-sm flex flex-col justify-center"><span class="text-[10px] text-gray-400 font-bold uppercase mb-1 flex items-center gap-1"><i data-lucide="hash" class="w-3 h-3"></i> الكود الوظيفي</span><span class="text-base font-black text-blue-700 dark:text-blue-400">{{ selectedEmployee.code }}</span></div><div v-if="selectedEmployee.phone" class="bg-white dark:bg-slate-800 border border-gray-100 dark:border-slate-700 rounded-2xl p-4 shadow-sm flex flex-col justify-center"><span class="text-[10px] text-gray-400 font-bold uppercase mb-1 flex items-center gap-1"><i data-lucide="smartphone" class="w-3 h-3"></i> رقم الهاتف</span><span class="text-sm font-black text-gray-900 dark:text-white tracking-wide" dir="ltr">{{ selectedEmployee.phone }}</span></div><div :class="(selectedEmployee.code && selectedEmployee.phone) ? 'col-span-2' : (selectedEmployee.code || selectedEmployee.phone ? 'col-span-1' : 'col-span-2')" class="bg-white dark:bg-slate-800 border border-gray-100 dark:border-slate-700 rounded-2xl p-4 shadow-sm flex flex-col justify-center"><span class="text-[10px] text-gray-400 font-bold uppercase mb-1 flex items-center gap-1"><i data-lucide="layout-grid" class="w-3 h-3"></i> القسم المعين</span><span class="text-sm font-bold text-gray-900 dark:text-white">{{ getDeptName(selectedEmployee) }}</span></div></div></div>
                        <div v-if="isAdmin && selectedEmployee" class="px-5 pt-2 border-t border-gray-200/50 dark:border-slate-700 flex gap-3"><button @click="deleteEmployee(selectedEmployee.uid)" class="flex-[1] bg-white dark:bg-slate-800 border border-rose-200 dark:border-rose-900/50 text-rose-600 dark:text-rose-400 rounded-2xl py-3.5 text-xs font-bold flex items-center justify-center gap-1.5 shadow-sm active:scale-95"><i data-lucide="archive" class="w-4 h-4"></i> مسح</button><button @click="openModal('form', selectedEmployee.uid)" class="flex-[2] bg-gray-900 dark:bg-blue-600 text-white rounded-2xl py-3.5 text-xs font-bold flex items-center justify-center gap-1.5 shadow-md active:scale-95"><i data-lucide="edit-3" class="w-4 h-4"></i> تعديل البيانات</button></div>
                    </div>

                    <div v-show="modal === 'substitutes' && selectedEmployee">
                        <div v-if="selectedEmployee" class="substitutes-header-bg relative rounded-b-[40px] pt-12 pb-12 px-6 text-center shadow-lg mb-6"><div class="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full blur-2xl -mr-10 -mt-10 pointer-events-none"></div><div class="absolute bottom-0 left-0 w-24 h-24 bg-white/10 rounded-full blur-xl -ml-5 -mb-5 pointer-events-none"></div><div class="relative inline-block mb-3 z-10"><div class="w-20 h-20 bg-white dark:bg-slate-800 rounded-[22px] flex items-center justify-center text-indigo-600 dark:text-indigo-400 shadow-2xl border-4 border-white/20 dark:border-white/10"><i data-lucide="users" class="w-10 h-10"></i></div></div><h2 class="relative z-10 text-[20px] font-black text-white leading-tight mb-2">طاقم البدلاء المتاحين</h2><div class="relative z-10 inline-flex items-center gap-1.5 bg-white/15 backdrop-blur-sm px-4 py-1.5 text-white text-[11px] font-bold rounded-xl border border-white/20"><i data-lucide="briefcase" class="w-3.5 h-3.5"></i><span class="truncate max-w-[200px]">{{ selectedEmployee.jobTitle }}</span></div></div>
                        <div v-if="availableSubstitutes.length === 0" class="py-6 flex flex-col items-center justify-center text-center px-6"><div class="w-16 h-16 bg-gray-100 dark:bg-slate-800 rounded-full flex items-center justify-center mb-3"><i data-lucide="user-x" class="w-8 h-8 text-gray-300 dark:text-gray-600"></i></div><h4 class="text-sm font-bold text-gray-500 dark:text-gray-400 mb-1">عفواً، لا يوجد بدلاء مسجلين</h4></div>
                        <div class="space-y-3 px-5 mb-6"><div v-for="sub in availableSubstitutes" :key="sub.uid" :class="{'border-rose-100 dark:border-rose-900/50': sub.status === 'sick', 'border-amber-100 dark:border-amber-900/50': sub.status === 'training', 'border-gray-100 dark:border-slate-700': sub.status === 'active' || !sub.status}" class="bg-white dark:bg-slate-800 p-3.5 rounded-[16px] border shadow-sm flex flex-col gap-3">
                            <div class="flex items-center justify-between">
                                <div class="flex items-center gap-3">
                                    <div :class="{'bg-rose-50 dark:bg-rose-900/30 text-rose-500 dark:text-rose-400': sub.status === 'sick', 'bg-amber-50 dark:bg-amber-900/30 text-amber-500 dark:text-amber-400': sub.status === 'training', 'bg-emerald-50 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400': sub.status === 'active' || !sub.status}" class="w-10 h-10 rounded-[12px] flex items-center justify-center font-bold text-sm">{{ sub.shift === 'office' ? '💼' : sub.shift }}</div>
                                    <div>
                                        <h4 :class="{'text-rose-700 dark:text-rose-400': sub.status === 'sick', 'text-amber-700 dark:text-amber-500': sub.status === 'training', 'text-gray-900 dark:text-white': sub.status === 'active' || !sub.status}" class="text-[13px] font-bold">{{ sub.name }}</h4>
                                        <p class="text-[10px] text-gray-500 dark:text-gray-400 mt-0.5"><i data-lucide="map-pin" class="w-3 h-3 inline"></i> {{ getDeptName(sub) }}</p>
                                    </div>
                                </div>
                                <div class="badge-status" :class="{'badge-inactive': sub.status === 'sick', 'badge-active': sub.status === 'active' || !sub.status}" :style="sub.status === 'training' ? 'background-color: rgba(245, 158, 11, 0.1); border-color: rgba(245, 158, 11, 0.2);' : ''">
                                    <span :class="{'bg-rose-500': sub.status === 'sick', 'bg-amber-500': sub.status === 'training', 'bg-emerald-500': sub.status === 'active' || !sub.status}" class="w-1.5 h-1.5 rounded-full"></span>
                                    <span :class="{'text-rose-700 dark:text-rose-400': sub.status === 'sick', 'text-amber-700 dark:text-amber-400': sub.status === 'training', 'text-emerald-700 dark:text-emerald-400': sub.status === 'active' || !sub.status}" class="text-[9px] font-bold">{{ sub.status === 'sick' ? 'مرضي' : (sub.status === 'training' ? 'متدرب' : 'متاح') }}</span>
                                </div>
                            </div>
                            <div v-if="sub.phone" class="flex gap-2 pt-2 border-t border-gray-50 dark:border-slate-700"><a :href="'tel:' + sub.phone" class="flex-1 bg-gray-50 dark:bg-slate-700 text-gray-600 dark:text-gray-300 py-2 rounded-[10px] flex items-center justify-center gap-2 text-[11px] font-bold"><i data-lucide="phone" class="w-3.5 h-3.5"></i> اتصال</a><a :href="'https://wa.me/' + cleanPhone(sub.phone)" target="_blank" class="flex-1 bg-gray-50 dark:bg-slate-700 text-gray-600 dark:text-gray-300 py-2 rounded-[10px] flex items-center justify-center gap-2 text-[11px] font-bold"><i data-lucide="message-circle" class="w-3.5 h-3.5"></i> واتساب</a></div>
                        </div></div>
                    </div>
                </div>
            </div>

        </template> </div>

    <script src="main.js" defer></script>
    
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                .then(registration => {
                    registration.onupdatefound = () => {
                        const installingWorker = registration.installing;
                        installingWorker.onstatechange = () => {
                            if (installingWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                window.location.reload();
                            }
                        };
                    };
                })
                .catch(err => console.error('SW Registration Failed: ', err));
            });
        }
    </script>
</body>
